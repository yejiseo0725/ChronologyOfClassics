<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chronicle — prototype v3</title>
    <link rel="preconnect" href="https://fastly.jsdelivr.net">
    <link href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
        rel="stylesheet">
    <style>
        :root {
            --paper: #FAFAF7;
            --ink: #1A1A1A;
            --blue: #1E40AF;
            --line: rgba(26, 26, 26, .14);
            --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
            --body: "Pretendard", "Pretendard Variable", -apple-system, sans-serif;
            --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            overflow: hidden
        }

        body {
            font-family: var(--body);
            color: var(--ink);
            background: var(--paper);
            -webkit-font-smoothing: antialiased;
            transition: background .8s
        }

        .skip {
            position: absolute;
            left: -9999px
        }

        .skip:focus {
            left: 12px;
            top: 12px;
            z-index: 99;
            background: var(--ink);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px
        }

        .brand {
            position: fixed;
            top: 18px;
            left: 26px;
            z-index: 22;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .18em;
            opacity: .7
        }

        .brand b {
            color: var(--blue)
        }

        /* ---- filter bar ---- */
        .filters {
            position: fixed;
            top: 16px;
            right: 26px;
            z-index: 22;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .filters input,
        .filters select {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .04em;
            color: var(--ink);
            background: rgba(255, 255, 255, .7);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 7px 12px;
            outline: none
        }

        .filters input {
            width: 150px
        }

        .filters input:focus,
        .filters select:focus {
            border-color: var(--blue)
        }

        .filters .count {
            font-family: var(--mono);
            font-size: 10px;
            opacity: .45;
            letter-spacing: .06em;
            min-width: 54px
        }

        .filters .clear {
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            opacity: .5;
            text-decoration: underline;
            background: none;
            border: none
        }

        /* ---- sundial ---- */
        .dial {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            z-index: 20;
            pointer-events: none
        }

        .dial svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible
        }

        /* ---- era label + quote ---- */
        .era-label {
            position: fixed;
            left: 0;
            right: 0;
            top: 29%;
            z-index: 3;
            pointer-events: none;
            text-align: center
        }

        .era-label .cent {
            font-family: var(--serif);
            font-size: clamp(64px, 13vw, 175px);
            line-height: .9;
            opacity: .06;
            letter-spacing: -.02em
        }

        .era-label .era-sub {
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: .35em;
            opacity: .3;
            margin-top: 10px;
            text-transform: uppercase
        }

        .era-quote {
            position: fixed;
            left: 0;
            right: 0;
            top: 57%;
            z-index: 3;
            text-align: center;
            pointer-events: none;
            font-family: var(--serif);
            font-style: italic;
            font-size: 18px;
            opacity: 0;
            transition: opacity 1.1s;
            padding: 0 14vw
        }

        .era-quote.show {
            opacity: .5
        }

        .era-quote small {
            display: block;
            font-style: normal;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .15em;
            opacity: .6;
            margin-top: 9px;
            text-transform: uppercase
        }

        /* ---- track / zones ---- */
        #track {
            position: absolute;
            inset: 0;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            align-items: flex-end;
            scroll-behavior: smooth;
            padding-bottom: 11vh;
            z-index: 5
        }

        #track::-webkit-scrollbar {
            height: 6px
        }

        #track::-webkit-scrollbar-thumb {
            background: var(--line);
            border-radius: 3px
        }

        .shelf {
            display: flex;
            align-items: flex-end;
            height: 100%
        }

        .zone {
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            padding: 0 54px;
            height: 100%;
            flex: 0 0 auto;
            border-right: 1px solid var(--line)
        }

        .zone.hidden {
            display: none
        }

        .zone .watermark {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            height: 52vh;
            z-index: 0;
            pointer-events: none;
            color: var(--ink);
            opacity: .055
        }

        .zone .watermark svg {
            height: 100%;
            width: auto
        }

        .zone-tag {
            position: absolute;
            top: 172px;
            left: 54px;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .14em;
            opacity: .42;
            z-index: 2
        }

        /* ---- spine : title only, large ---- */
        .book {
            position: relative;
            flex: 0 0 auto;
            width: 44px;
            height: 250px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            z-index: 2;
            transition: transform .32s cubic-bezier(.2, .8, .2, 1);
            align-self: flex-end
        }

        .book.dim {
            opacity: .12;
            filter: grayscale(1)
        }

        .book:hover,
        .book:focus-visible {
            transform: translateY(-46px);
            outline: none
        }

        .book:focus-visible .spine {
            box-shadow: 0 0 0 2px var(--paper), 0 0 0 4px var(--blue)
        }

        .spine {
            width: 100%;
            height: 100%;
            border-radius: 2px 2px 1px 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 6px;
            color: #fff;
            overflow: hidden;
            box-shadow: inset -7px 0 13px rgba(0, 0, 0, .3), inset 3px 0 4px rgba(255, 255, 255, .14), 2px 3px 8px rgba(0, 0, 0, .22)
        }

        .spine .s-title {
            writing-mode: vertical-rl;
            font-family: var(--serif);
            font-size: 16px;
            line-height: 1.05;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-height: 224px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, .35)
        }

        .ribbon {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 26px;
            background: var(--blue);
            border-radius: 0 0 2px 2px;
            opacity: 0;
            box-shadow: 0 2px 3px rgba(0, 0, 0, .3)
        }

        .book.reading .ribbon {
            opacity: 1
        }

        .dot {
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--blue);
            opacity: 0
        }

        .book.read .dot {
            opacity: 1
        }

        /* ---- overlay ---- */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: none;
            background: rgba(20, 20, 20, .55);
            backdrop-filter: blur(3px);
            align-items: center;
            justify-content: center;
            padding: 28px
        }

        .overlay.open {
            display: flex
        }

        .panel {
            position: relative;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 34px;
            max-width: 860px;
            width: 100%;
            background: var(--paper);
            border-radius: 14px;
            padding: 38px 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, .4);
            animation: rise .38s cubic-bezier(.2, .8, .2, 1)
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .p-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px
        }

        .p-eyebrow {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .16em;
            color: var(--blue);
            text-transform: uppercase
        }

        .p-title {
            font-family: var(--serif);
            font-size: 34px;
            line-height: 1.05;
            margin: 12px 0 4px
        }

        .p-author {
            font-size: 15px;
            opacity: .6;
            margin-bottom: 20px
        }

        .p-syn {
            font-family: var(--serif);
            font-size: 16px;
            line-height: 1.65;
            color: #2a2a2a;
            min-height: 80px
        }

        .meta {
            margin-top: 24px;
            border-top: 1px solid var(--line);
            padding-top: 16px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 9px 22px
        }

        .meta dt {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .1em;
            opacity: .45;
            text-transform: uppercase;
            align-self: center
        }

        .meta dd {
            font-size: 14px
        }

        .langtoggle {
            margin: 18px 0 0;
            display: flex;
            gap: 6px
        }

        .langtoggle button {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .1em;
            padding: 5px 12px;
            border: 1px solid var(--line);
            background: none;
            border-radius: 20px;
            cursor: pointer
        }

        .langtoggle button.on {
            background: var(--ink);
            color: #fff;
            border-color: var(--ink)
        }

        /* heart (Comeau-style burst) */
        .heart {
            position: relative;
            width: 42px;
            height: 42px;
            border: none;
            background: none;
            cursor: pointer;
            flex: 0 0 auto
        }

        .heart svg {
            width: 26px;
            height: 26px;
            position: absolute;
            top: 8px;
            left: 8px;
            transition: transform .25s cubic-bezier(.2, .8, .2, 1)
        }

        .heart .fill {
            fill: var(--blue);
            opacity: 0;
            transform: scale(.4);
            transform-origin: center;
            transition: transform .3s cubic-bezier(.2, 1.6, .4, 1), opacity .2s
        }

        .heart .outline {
            fill: none;
            stroke: var(--ink);
            stroke-width: 1.6;
            opacity: .5
        }

        .heart.on .fill {
            opacity: 1;
            transform: scale(1)
        }

        .heart.on .outline {
            opacity: 0
        }

        .heart .burst {
            position: absolute;
            inset: 0;
            pointer-events: none
        }

        .heart .burst i {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--blue);
            opacity: 0
        }

        .heart.pop .burst i {
            animation: burst .5s ease-out forwards
        }

        @keyframes burst {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(.3)
            }
        }

        .heart.pop svg {
            animation: beat .35s ease
        }

        @keyframes beat {

            0%,
            100% {
                transform: scale(1)
            }

            40% {
                transform: scale(1.35)
            }
        }

        .cover-wrap {
            perspective: 900px;
            align-self: start
        }

        .cover {
            position: relative;
            width: 300px;
            height: 430px;
            border-radius: 6px;
            transform-style: preserve-3d;
            transition: transform .1s ease-out;
            box-shadow: 0 22px 45px rgba(0, 0, 0, .35);
            overflow: hidden;
            will-change: transform;
            border: 1px solid rgba(0, 0, 0, .08)
        }

        .cover svg {
            width: 100%;
            height: 100%;
            display: block
        }

        .cover .glare {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity .2s
        }

        .buy {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .buy a {
            font-size: 13px;
            text-align: center;
            padding: 11px;
            border-radius: 8px;
            text-decoration: none;
            display: block
        }

        .buy .primary {
            background: #ff9900;
            color: #111;
            font-weight: 600
        }

        .buy .ghost {
            border: 1px solid var(--line);
            color: var(--ink)
        }

        .hint {
            font-family: var(--mono);
            font-size: 10px;
            opacity: .4;
            margin-top: 10px;
            text-align: center;
            letter-spacing: .05em
        }

        .close {
            position: absolute;
            top: 18px;
            right: 22px;
            font-family: var(--mono);
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            opacity: .5;
            line-height: 1;
            z-index: 2
        }

        .close:hover {
            opacity: 1
        }

        .guide {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .08em;
            opacity: .4;
            pointer-events: none
        }

        .empty {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 4;
            font-family: var(--serif);
            font-style: italic;
            font-size: 20px;
            opacity: .4;
            pointer-events: none
        }

        @media (prefers-reduced-motion:reduce) {
            * {
                transition: none !important;
                animation: none !important;
                scroll-behavior: auto !important
            }
        }
    </style>
</head>

<body>
    <a href="#track" class="skip">Skip to the shelf</a>
    <div class="brand">THE CHRONICLE <b>/</b> world literature, in order</div>

    <div class="filters">
        <input id="q" type="text" placeholder="title…" aria-label="Search title">
        <select id="fCountry" aria-label="Country">
            <option value="">country</option>
        </select>
        <select id="fLang" aria-label="Language">
            <option value="">language</option>
        </select>
        <span class="count" id="count"></span>
        <button class="clear" id="clear">reset</button>
    </div>

    <div class="dial"><svg id="dialSvg" viewBox="0 0 1200 200" preserveAspectRatio="xMidYMin meet"></svg></div>

    <div class="era-label">
        <div class="cent" id="eraCent"></div>
        <div class="era-sub" id="eraSub"></div>
    </div>
    <div class="era-quote" id="eraQuote"></div>
    <div class="empty" id="empty">no books match.</div>

    <main id="track">
        <div class="shelf" id="shelf"></div>
    </main>
    <div class="guide">scroll sideways · hover to pull a book · click to open</div>

    <div class="overlay" id="overlay" aria-modal="true" role="dialog">
        <div class="panel">
            <button class="close" id="close" aria-label="Close">✕</button>
            <div>
                <div class="p-top">
                    <div>
                        <div class="p-eyebrow" id="pEye"></div>
                        <h2 class="p-title" id="pTitle"></h2>
                        <div class="p-author" id="pAuthor"></div>
                    </div>
                    <button class="heart" id="heart" aria-label="Save to favourites">
                        <svg viewBox="0 0 24 24">
                            <path class="outline" d="M12 21C-5 9 5 1 12 7 19 1 29 9 12 21Z" />
                            <path class="fill" d="M12 21C-5 9 5 1 12 7 19 1 29 9 12 21Z" />
                        </svg>
                        <span class="burst" id="burst"></span>
                    </button>
                </div>
                <div class="langtoggle"><button data-l="en" class="on">EN</button><button data-l="ko">KO</button></div>
                <p class="p-syn" id="pSyn"></p>
                <dl class="meta">
                    <dt id="dtYear">Written</dt>
                    <dd id="mYear"></dd>
                    <dt id="dtOrigin">Country</dt>
                    <dd id="mOrigin"></dd>
                    <dt id="dtLang">Language</dt>
                    <dd id="mLang"></dd>
                    <dt id="dtForm">Form</dt>
                    <dd id="mForm"></dd>
                </dl>
            </div>
            <div>
                <div class="cover-wrap">
                    <div class="cover" id="cover"></div>
                </div>
                <div class="buy"><a class="primary" id="amazon" href="#" target="_blank" rel="noopener">Buy on Amazon
                        US</a><a class="ghost" id="gutenberg" href="#" target="_blank" rel="noopener">Read on
                        Gutenberg</a></div>
                <div class="hint">move the mouse to tilt</div>
            </div>
        </div>
    </div>

    <script>
        /* ---------- JSON schema (title/year/country/language/form/synopsis en+ko) ---------- */
        const BOOKS = [
            { t: "Iliad", au: "Homer", y: -750, country: "Greece", lang: "Ancient Greek", form: "Epic poem", read: 1, en: "The wrath of Achilles in the final year of the Trojan War.", ko: "트로이 전쟁 마지막 해, 아킬레우스의 분노." },
            { t: "Odyssey", au: "Homer", y: -725, country: "Greece", lang: "Ancient Greek", form: "Epic poem", read: 1, en: "Odysseus's ten-year voyage home from Troy.", ko: "트로이에서 돌아가는 오디세우스의 10년 항해." },
            { t: "Oedipus Rex", au: "Sophocles", y: -429, country: "Greece", lang: "Ancient Greek", form: "Tragedy", read: 1, en: "A king's search for a murderer that ends at his own door.", ko: "살인자를 쫓던 왕이 자신에게 도달한다." },
            { t: "Aeneid", au: "Virgil", y: -19, country: "Rome", lang: "Latin", form: "Epic poem", read: 1, en: "Aeneas flees burning Troy to found the line of Rome.", ko: "불타는 트로이를 떠나 로마의 시조가 되다." },
            { t: "Metamorphoses", au: "Ovid", y: 8, country: "Rome", lang: "Latin", form: "Poem", reading: 1, en: "Fifteen books of transformation myths, creation to Caesar.", ko: "천지창조부터 카이사르까지 변신 신화 15권." },
            { t: "Confessions", au: "Augustine", y: 400, country: "Rome", lang: "Latin", form: "Memoir", en: "The first Western autobiography — sin and conversion.", ko: "죄와 회심을 기록한 서양 최초의 자서전." },
            { t: "Beowulf", au: "Anonymous", y: 1000, country: "England", lang: "Old English", form: "Epic poem", read: 1, en: "A hero fights Grendel, its mother, and a dragon.", ko: "그렌델과 그 어미, 용과 싸우는 영웅." },
            { t: "The Divine Comedy", au: "Dante", y: 1320, country: "Italy", lang: "Italian", form: "Epic poem", read: 1, en: "A journey through Hell, Purgatory, and Paradise.", ko: "지옥·연옥·천국을 지나는 여정." },
            { t: "The Decameron", au: "Boccaccio", y: 1353, country: "Italy", lang: "Italian", form: "Frame tale", read: 1, en: "Ten Florentines flee the plague and tell a hundred tales.", ko: "흑사병을 피한 열 명의 백 가지 이야기." },
            { t: "The Canterbury Tales", au: "Chaucer", y: 1400, country: "England", lang: "Middle English", form: "Frame tale", en: "Pilgrims to Canterbury pass time with tales.", ko: "캔터베리 순례자들이 나누는 이야기들." },
            { t: "Don Quixote", au: "Cervantes", y: 1605, country: "Spain", lang: "Spanish", form: "Novel", read: 1, en: "A gentleman reads too many romances and rides out as a knight.", ko: "기사 소설을 너무 읽은 신사가 기사가 되어 떠난다." },
            { t: "Hamlet", au: "Shakespeare", y: 1601, country: "England", lang: "English", form: "Tragedy", read: 1, en: "A Danish prince, a murdered father, the paralysis of thought.", ko: "덴마크 왕자, 살해된 아버지, 사유의 마비." },
            { t: "Paradise Lost", au: "Milton", y: 1667, country: "England", lang: "English", form: "Epic poem", read: 1, en: "The fall of man and the ambition of Satan.", ko: "인간의 타락과 사탄의 야망." },
            { t: "Faust", au: "Goethe", y: 1808, country: "Germany", lang: "German", form: "Drama", en: "A scholar bargains his soul for boundless experience.", ko: "무한한 경험을 위해 영혼을 건 학자." },
            { t: "War and Peace", au: "Tolstoy", y: 1869, country: "Russia", lang: "Russian", form: "Novel", read: 1, en: "Five families across the Napoleonic invasion of Russia.", ko: "나폴레옹 침공을 관통하는 다섯 가문." },
            { t: "Crime and Punishment", au: "Dostoevsky", y: 1866, country: "Russia", lang: "Russian", form: "Novel", read: 1, en: "A poor student murders to test a theory about himself.", ko: "자신의 이론을 시험하려 살해하는 학생." },
            { t: "Ulysses", au: "Joyce", y: 1922, country: "Ireland", lang: "English", form: "Novel", en: "One Dublin day in every style the language allows.", ko: "더블린의 하루를 가능한 모든 문체로." },
        ];

        /* grouping: antiquity(<500AD) merged; AD by century */
        function century(y) { return Math.floor((y - 1) / 100) + 1; }
        function roman(n) { const m = [[1000, "M"], [900, "CM"], [500, "D"], [400, "CD"], [100, "C"], [90, "XC"], [50, "L"], [40, "XL"], [10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]]; let r = ""; for (const [v, s] of m) while (n >= v) { r += s; n -= v; } return r; }
        function groupKey(b) { return b.y < 500 ? "ANT" : "C" + century(b.y); }
        function groupMeta(k) {
            if (k === "ANT") return { label: "Ancient Greece & Rome", cent: "Antiquity", roman: "❈", sym: "antiquity" };
            const c = +k.slice(1); const symKey = c <= 15 ? "medieval" : c <= 17 ? "renaissance" : c <= 19 ? "c19" : "c20";
            return { label: ordinal(c) + " century", cent: ordinal(c), roman: roman(c), sym: symKey };
        }
        function ordinal(n) { const s = ["th", "st", "nd", "rd"], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }

        const HUE = { antiquity: "#7a5c3e", medieval: "#4a3a52", renaissance: "#2f3b52", c19: "#3a2f4a", c20: "#26303b" };
        const PAPER = { antiquity: "#f3ede1", medieval: "#f0ece8", renaissance: "#ecedf1", c19: "#eeebf0", c20: "#e9ebee" };
        const QUOTE = { ANT: ["Sing, goddess, the anger of Achilles.", "Homer · Iliad"], C11: ["", ""], C14: ["Midway upon the journey of our life…", "Dante · Inferno"], C17: ["To be, or not to be.", "Shakespeare · Hamlet"], C19: ["Happy families are all alike.", "Tolstoy · Anna Karenina"], C20: ["riverrun, past Eve and Adam's…", "Joyce · Finnegans Wake"] };
        const SYM = {
            antiquity: `<svg viewBox="0 0 200 400" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="58" y="34" width="84" height="18"/><path d="M68 52v300M84 52v300M100 52v300M116 52v300M132 52v300"/><rect x="50" y="352" width="100" height="16"/><path d="M58 34c8-14 76-14 84 0" /></svg>`,
            medieval: `<svg viewBox="0 0 200 400" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M36 400V150a64 64 0 01128 0v250"/><path d="M68 400V205a32 32 0 0164 0v195"/><circle cx="100" cy="108" r="36"/><path d="M100 72v72M64 108h72M76 84l48 48M124 84l-48 48"/></svg>`,
            renaissance: `<svg viewBox="0 0 200 400" fill="none" stroke="currentColor" stroke-width="1.25"><circle cx="100" cy="150" r="86"/><circle cx="100" cy="150" r="60"/><circle cx="100" cy="150" r="30"/><path d="M14 150h172M100 64v172M39 89l122 122M161 89L39 211"/></svg>`,
            c19: `<svg viewBox="0 0 200 400" fill="none" stroke="currentColor" stroke-width="1.25"><rect x="38" y="70" width="124" height="220" rx="6"/><path d="M38 104c22-24 44-24 62 0s40 24 62 0M38 256c22 24 44 24 62 0s40-24 62 0"/><circle cx="100" cy="180" r="34"/><path d="M100 146v68"/></svg>`,
            c20: `<svg viewBox="0 0 200 400" fill="none" stroke="currentColor" stroke-width="1.25"><path d="M28 350L100 60l72 290M52 258h96M18 350h164"/><circle cx="100" cy="60" r="5" fill="currentColor"/></svg>`,
        };

        /* ---------- build zones ---------- */
        const shelf = document.getElementById('shelf');
        const seen = [], groups = [];
        BOOKS.slice().sort((a, b) => a.y - b.y).forEach(b => { const k = groupKey(b); let g = groups.find(g => g.k === k); if (!g) { g = { k, books: [] }; groups.push(g); } g.books.push(b); });
        const zones = [];
        groups.forEach(g => {
            const m = groupMeta(g.k);
            const zone = document.createElement('section'); zone.className = 'zone'; zone.dataset.k = g.k; zone.dataset.sym = m.sym;
            zone.innerHTML = `<div class="watermark">${SYM[m.sym] || ''}</div><div class="zone-tag">${m.label}</div>`;
            g.books.forEach(b => {
                const hue = HUE[m.sym];
                const btn = document.createElement('button'); btn.className = 'book' + (b.read ? ' read' : '') + (b.reading ? ' reading' : ''); btn.type = 'button';
                btn.dataset.title = b.t.toLowerCase(); btn.dataset.country = b.country; btn.dataset.lang = b.lang;
                btn.setAttribute('aria-label', b.t + ' by ' + b.au);
                btn.innerHTML = `<span class="ribbon"></span><span class="spine" style="background:linear-gradient(90deg,${shade(hue, -14)},${hue} 40%,${shade(hue, 10)})"><span class="s-title">${b.t}</span></span><span class="dot"></span>`;
                btn.addEventListener('click', () => openBook(b)); zone.appendChild(btn);
            });
            shelf.appendChild(zone); zones.push({ el: zone, k: g.k, meta: m, n: g.books.length });
        });
        function yr(y) { return y < 0 ? Math.abs(y) + " BC" : y + " AD"; }
        function shade(hex, p) { const n = parseInt(hex.slice(1), 16); let r = Math.max(0, Math.min(255, (n >> 16) + p)), g = Math.max(0, Math.min(255, (n >> 8 & 255) + p)), b = Math.max(0, Math.min(255, (n & 255) + p)); return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`; }

        /* filter elements (declare before use) + populate dropdowns */
        const q = document.getElementById('q'), fCountry = document.getElementById('fCountry'), fLang = document.getElementById('fLang'),
            countEl = document.getElementById('count'), emptyEl = document.getElementById('empty');
        [...new Set(BOOKS.map(b => b.country))].sort().forEach(c => fCountry.add(new Option(c, c)));
        [...new Set(BOOKS.map(b => b.lang))].sort().forEach(l => fLang.add(new Option(l, l)));

        /* ---------- decorative sundial (double ring + roman numerals + sun-face) ---------- */
        const CX = 600, CY = -620, R = 730, R2 = 760, SPAN = 30;
        const svg = document.getElementById('dialSvg');
        function pt(deg, rad) { const r = deg * Math.PI / 180; return [CX + rad * Math.sin(r), CY + rad * Math.cos(r)]; }
        (function () {
            let s = '';
            const arc = (rad, op) => { const [lx, ly] = pt(-SPAN, rad), [rx, ry] = pt(SPAN, rad); return `<path d="M${lx} ${ly} A${rad} ${rad} 0 0 1 ${rx} ${ry}" fill="none" stroke="rgba(26,26,26,${op})" stroke-width="1"/>`; };
            s += arc(R, .22) + arc(R2, .14);
            for (let d = -SPAN; d <= SPAN; d += SPAN / 12) { const [x1, y1] = pt(d, R), [x2, y2] = pt(d, R2); s += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(26,26,26,.16)" stroke-width="1"/>`; }
            zones.forEach((z, i) => {
                const p = (i + .5) / zones.length, deg = -SPAN + p * 2 * SPAN; const [x, y] = pt(deg, R - 4); const [tx, ty] = pt(deg, R - 26);
                s += `<circle cx="${x}" cy="${y}" r="3" fill="rgba(26,26,26,.4)" class="etick" data-i="${i}"/>`;
                s += `<text x="${tx}" y="${ty}" text-anchor="middle" font-family="var(--serif)" font-size="15" fill="rgba(26,26,26,.5)" class="elabel" data-i="${i}">${z.meta.roman}</text>`;
            });
            // sun-face marker
            s += `<g id="sun"><g id="rays"></g><circle r="11" fill="var(--blue)"/><circle r="11" fill="none" stroke="#fff" stroke-width="1" opacity=".5"/>
     <circle cx="-3.5" cy="-2" r="1.3" fill="#fff"/><circle cx="3.5" cy="-2" r="1.3" fill="#fff"/><path d="M-4 4Q0 7 4 4" fill="none" stroke="#fff" stroke-width="1.2"/></g>`;
            svg.innerHTML = s;
            let rays = ''; for (let a = 0; a < 360; a += 30) { rays += `<line x1="0" y1="0" x2="0" y2="-18" stroke="var(--blue)" stroke-width="1.4" transform="rotate(${a})" opacity=".55"/>`; }
            document.getElementById('rays').innerHTML = rays;
        })();
        const sun = document.getElementById('sun');

        /* ---------- scroll orchestration ---------- */
        const track = document.getElementById('track'), eraCent = document.getElementById('eraCent'), eraSub = document.getElementById('eraSub'), eraQuote = document.getElementById('eraQuote');
        let curK = null;
        function visibleZones() { return zones.filter(z => !z.el.classList.contains('hidden')); }
        function onScroll() {
            const vis = visibleZones(); if (!vis.length) return;
            const max = track.scrollWidth - track.clientWidth, p = max > 0 ? track.scrollLeft / max : 0;
            const deg = -SPAN + p * 2 * SPAN, [sx, sy] = pt(deg, R - 4); sun.setAttribute('transform', `translate(${sx} ${sy}) rotate(${p * 40})`);
            const cx = track.scrollLeft + track.clientWidth / 2; let cur = vis[0]; for (const z of vis) if (z.el.offsetLeft <= cx) cur = z;
            if (cur.k !== curK) {
                curK = cur.k; const m = cur.meta;
                eraCent.textContent = m.cent; eraSub.textContent = cur.n + " works";
                document.body.style.background = PAPER[m.sym];
                const gi = zones.indexOf(cur);
                svg.querySelectorAll('.etick').forEach(t => t.setAttribute('fill', +t.dataset.i === gi ? 'var(--blue)' : 'rgba(26,26,26,.4)'));
                svg.querySelectorAll('.elabel').forEach(t => t.setAttribute('fill', +t.dataset.i === gi ? 'var(--blue)' : 'rgba(26,26,26,.5)'));
                const q = QUOTE[cur.k]; eraQuote.className = 'era-quote'; if (q && q[0]) { eraQuote.innerHTML = `“${q[0]}”<small>${q[1]}</small>`; void eraQuote.offsetWidth; eraQuote.className = 'era-quote show'; }
            }
        }
        track.addEventListener('scroll', () => requestAnimationFrame(onScroll), { passive: true });
        track.addEventListener('wheel', e => { if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) { track.scrollLeft += e.deltaY; e.preventDefault(); } }, { passive: false });
        onScroll();

        /* ---------- filter ---------- */
        function applyFilter() {
            const qs = q.value.trim().toLowerCase(), c = fCountry.value, l = fLang.value; let shown = 0;
            zones.forEach(z => {
                let zc = 0;
                z.el.querySelectorAll('.book').forEach(bk => {
                    const ok = (!qs || bk.dataset.title.includes(qs)) && (!c || bk.dataset.country === c) && (!l || bk.dataset.lang === l);
                    bk.classList.toggle('dim', !ok); if (ok) { zc++; shown++; }
                });
                z.el.classList.toggle('hidden', zc === 0);
            });
            countEl.textContent = shown + " / " + BOOKS.length;
            emptyEl.style.display = shown ? 'none' : 'flex';
            curK = null; track.scrollLeft = 0; onScroll();
        }
        [q, fCountry, fLang].forEach(el => el.addEventListener('input', applyFilter));
        document.getElementById('clear').addEventListener('click', () => { q.value = ''; fCountry.value = ''; fLang.value = ''; applyFilter(); });
        applyFilter();

        /* ---------- generated cover ---------- */
        function hash(s) { let h = 0; for (let i = 0; i < s.length; i++)h = (h * 31 + s.charCodeAt(i)) | 0; return Math.abs(h); }
        function coverSVG(b, symKey) {
            const base = HUE[symKey]; const rot = (hash(b.t) % 7) - 3;
            return `<svg viewBox="0 0 300 430" preserveAspectRatio="none" role="img" aria-label="${b.t}"><rect width="300" height="430" fill="${shade(base, -6)}"/><rect x="14" y="14" width="272" height="402" fill="none" stroke="rgba(255,255,255,.28)"/><line x1="30" y1="120" x2="270" y2="120" stroke="rgba(255,255,255,.22)"/><line x1="30" y1="330" x2="270" y2="330" stroke="rgba(255,255,255,.22)"/><text x="30" y="200" fill="#fff" font-family="var(--serif)" font-size="32" transform="rotate(${rot} 30 195)">${wrap(b.t).map((l, i) => `<tspan x="30" dy="${i ? 36 : 0}">${l}</tspan>`).join('')}</text><text x="30" y="365" fill="rgba(255,255,255,.72)" font-family="var(--body)" font-size="15">${b.au}</text><text x="270" y="400" text-anchor="end" fill="rgba(255,255,255,.5)" font-family="var(--mono)" font-size="12">${yr(b.y)}</text></svg>`;
        }
        function wrap(t) { const w = t.split(' '); const out = []; let c = ''; w.forEach(x => { if ((c + ' ' + x).trim().length > 12) { out.push(c.trim()); c = x; } else c += ' ' + x; }); if (c.trim()) out.push(c.trim()); return out.slice(0, 3); }

        /* ---------- overlay + full-language toggle ---------- */
        const overlay = document.getElementById('overlay'); let curBook = null, curLang = 'en';
        const T = { en: { Written: "Written", Country: "Country", Language: "Language", Form: "Form" }, ko: { Written: "성립연도", Country: "국가", Language: "언어", Form: "형식" } };
        function openBook(b) {
            curBook = b; const symKey = groupMeta(groupKey(b)).sym;
            document.getElementById('pTitle').textContent = b.t; document.getElementById('pAuthor').textContent = b.au;
            document.getElementById('pEye').textContent = groupMeta(groupKey(b)).label.toUpperCase() + ' · ' + yr(b.y);
            document.getElementById('cover').innerHTML = coverSVG(b, symKey) + '<div class="glare"></div>';
            document.getElementById('amazon').href = 'https://www.amazon.com/s?k=' + encodeURIComponent(b.t + ' ' + b.au);
            document.getElementById('gutenberg').href = 'https://www.gutenberg.org/ebooks/search/?query=' + encodeURIComponent(b.t);
            heart.className = 'heart'; setLang(curLang); overlay.classList.add('open'); document.getElementById('close').focus(); bindTilt();
        }
        function setLang(l) {
            curLang = l; const b = curBook;
            document.getElementById('pSyn').textContent = b[l];
            document.getElementById('mYear').textContent = yr(b.y); document.getElementById('mOrigin').textContent = b.country;
            document.getElementById('mLang').textContent = b.lang; document.getElementById('mForm').textContent = b.form;
            document.getElementById('dtYear').textContent = T[l].Written; document.getElementById('dtOrigin').textContent = T[l].Country;
            document.getElementById('dtLang').textContent = T[l].Language; document.getElementById('dtForm').textContent = T[l].Form;
            document.getElementById('amazon').textContent = l === 'ko' ? '아마존 US에서 구매' : 'Buy on Amazon US';
            document.getElementById('gutenberg').textContent = l === 'ko' ? '구텐베르크에서 읽기' : 'Read on Gutenberg';
            document.querySelectorAll('.langtoggle button').forEach(x => x.classList.toggle('on', x.dataset.l === l));
        }
        document.querySelectorAll('.langtoggle button').forEach(x => x.addEventListener('click', () => setLang(x.dataset.l)));
        document.getElementById('close').addEventListener('click', () => overlay.classList.remove('open'));
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
        window.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });

        /* ---------- heart (Comeau-style) ---------- */
        const heart = document.getElementById('heart'), burst = document.getElementById('burst');
        (function () { let h = ''; for (let i = 0; i < 8; i++) { const a = i / 8 * Math.PI * 2; h += `<i style="--tx:${Math.cos(a) * 26 - 2}px;--ty:${Math.sin(a) * 26 - 2}px"></i>`; } burst.innerHTML = h; })();
        heart.addEventListener('click', () => {
            const on = heart.classList.toggle('on');
            if (on) { heart.classList.remove('pop'); void heart.offsetWidth; heart.classList.add('pop'); }
        });

        /* ---------- tilt ---------- */
        let raf = null, pending = null, cover = document.getElementById('cover');
        function bindTilt() {
            cover = document.getElementById('cover');
            cover.onmousemove = e => { pending = e; if (!raf) raf = requestAnimationFrame(applyTilt); };
            cover.onmouseleave = () => { cover.style.transform = ''; const g = cover.querySelector('.glare'); if (g) g.style.opacity = 0; };
        }
        function applyTilt() {
            raf = null; const e = pending, r = cover.getBoundingClientRect(); const px = (e.clientX - r.left) / r.width, py = (e.clientY - r.top) / r.height;
            cover.style.transform = `rotateX(${(.5 - py) * 16}deg) rotateY(${(px - .5) * 16}deg)`;
            const g = cover.querySelector('.glare'); if (g) { g.style.opacity = .9; g.style.background = `radial-gradient(circle at ${px * 100}% ${py * 100}%,rgba(255,255,255,.4),transparent 55%)`; }
        }
    </script>
</body>
